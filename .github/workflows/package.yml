name: Package Extension

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - 'download/**'
      - '.github/workflows/**'
      - 'README.md'
      - 'cool.py'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Zip
        run: |
          mkdir -p download
          zip -r download/brain-lock.zip manifest.json background.js content.js lock.css options.html options.js popup.html popup.js

      - name: Commit and push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add download/brain-lock.zip
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update download zip [skip ci]" && git push)
