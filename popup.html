<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      box-sizing: border-box;
    }
    h2 { margin: 0 0 15px 0; color: #667eea; font-size: 20px; }
    .status { padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; }
    .locked { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    .unlocked { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      margin-top: 10px;
      transition: background-color 0.2s ease;
    }
    #optionsBtn { background: #667eea; color: white; }
    #optionsBtn:hover { background: #5568d3; }
    #resetBtn { background: #c94c4c; color: white; }
    #resetBtn:hover { background: #b33a3a; }
    .stats { margin-top: 15px; padding-top: 15px; border-top: 1px solid #e0e0e0; font-size: 13px; color: #666; }
  </style>
</head>
<body>
  <h2>🧠 Brain Lock</h2>
  <div id="status" class="status"></div>
  <div class="stats" id="stats"></div>

  <button id="optionsBtn">Edit Questions</button>
  <button id="resetBtn">Reset Answer Progress</button>
  
  <script src="popup.js"></script>
</body>
</html>
