<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg-gradient: radial-gradient(circle at center, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      --accent-color: #667eea;
      --accent-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --text-main: #ffffff;
      --text-dim: #a5b4fc;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    body {
      width: 350px;
      padding: 0;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      overflow-x: hidden;
    }

    .dashboard-container {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    header {
      text-align: center;
      margin-bottom: 5px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(to right, #fff, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .stat-value {
      font-size: 20px;
      font-weight: 800;
      color: var(--text-main);
      display: block;
    }

    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .info-section {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 15px;
      backdrop-filter: blur(10px);
    }

    .section-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .section-row:last-child {
      margin-bottom: 0;
    }

    .row-label {
      font-size: 13px;
      color: var(--text-dim);
      font-weight: 600;
    }

    .row-value {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-main);
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 5px 10px;
    }

    input[type="number"] {
      background: transparent;
      border: none;
      color: white;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      width: 50px;
      outline: none;
    }

    .unit {
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 600;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .primary-btn {
      background: var(--accent-gradient);
      color: white;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }

    .primary-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
    }

    .secondary-btn {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
    }

    .secondary-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .danger-btn {
      background: rgba(255, 77, 77, 0.1);
      border: 1px solid rgba(255, 77, 77, 0.3);
      color: #ff4d4d;
      margin-top: 5px;
    }

    .danger-btn:hover {
      background: rgba(255, 77, 77, 0.2);
    }

    #status-msg {
      font-size: 11px;
      text-align: center;
      min-height: 16px;
      transition: opacity 0.3s ease;
    }

    .error-text { color: #ff4d4d; }
    .success-text { color: #00ff88; }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <header>
      <h1>🧠 PARENT DASHBOARD</h1>
    </header>

    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-value" id="breaksToday">0</span>
        <span class="stat-label">Breaks Today</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="lifetimeBreaks">0</span>
        <span class="stat-label">Lifetime Total</span>
      </div>
    </div>

    <div class="info-section">
      <div class="section-row">
        <span class="row-label">Daily Category:</span>
        <span class="row-value" id="dailyCategory">None</span>
      </div>
      <div class="section-row">
        <span class="row-label">Current Streak:</span>
        <span class="row-value" id="currentStreak">0 Days</span>
      </div>
      <div class="section-row">
        <span class="row-label">Total XP:</span>
        <span class="row-value" id="totalXP">0</span>
      </div>
    </div>

    <div class="control-group">
      <label>Break Interval</label>
      <div class="input-wrapper">
        <input type="number" id="intervalInput" min="5" max="120" value="30">
        <span class="unit">minutes</span>
      </div>
    </div>

    <button id="testBtn" class="primary-btn">
      <span>🚀</span> Test Break Now
    </button>

    <div id="status-msg"></div>

    <button id="optionsBtn" class="secondary-btn">
      <span>⚙️</span> Edit Question Bank
    </button>
    <button id="resetBtn" class="danger-btn">
      <span>♻️</span> Reset Progress
    </button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
