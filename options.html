<!DOCTYPE html>
<html>
<head>
  <title>Brain Lock Settings</title>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: 20px auto;
      background-color: #f9f9f9;
    }
    h1 {
      color: #667eea;
    }
    textarea {
      width: 100%;
      height: 500px;
      font-family: monospace;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 15px;
      box-sizing: border-box;
    }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      color: white;
      margin-right: 10px;
      transition: background-color 0.2s ease;
    }
    #saveBtn {
      background-color: #667eea;
    }
    #saveBtn:hover {
      background-color: #5a6fd8;
    }
    #resetBtn {
      background-color: #f44336;
    }
    #resetBtn:hover {
      background-color: #d32f2f;
    }
    #status {
      margin-top: 15px;
      padding: 10px;
      border-radius: 6px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>Edit Questions</h1>
  <p>You can edit the questions in JSON format below. Ensure the structure of each question is correct before saving.</p>
  <textarea id="questionsJson" spellcheck="false"></textarea>
  <button id="saveBtn">Save Questions</button>
  <button id="fetchBtn" style="background-color: #4CAF50;">Fetch Latest from GitHub</button>
  <button id="resetBtn">Reset to Default</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
